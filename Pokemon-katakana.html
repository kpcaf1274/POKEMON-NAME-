<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン だーれだ？ (カタカナ)</title>
    <style>
        body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; text-align: center; background-color: #fdfae6; margin: 0; padding: 15px; color: #333; }
        #game-container { max-width: 550px; margin: 0 auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 8px solid #ff5a5a; }
        
        /* 画像エリア */
        #img-box { position: relative; width: 280px; height: 280px; margin: 15px auto; background: radial-gradient(#fff, #f0f0f0); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #pokemon-img { width: 90%; height: 90%; object-fit: contain; }
        .silhouette { filter: brightness(0); }
        .reveal { filter: brightness(1); transition: filter 0.8s ease; }

        /* 情報表示エリア */
        #info-display { margin-top: 10px; min-height: 60px; }
        .pokemon-name-main { font-size: 2.2rem; font-weight: bold; color: #e74c3c; margin: 5px 0; }
        .pokemon-details { font-size: 1rem; color: #555; background: #fff5f5; padding: 10px; border-radius: 10px; display: inline-block; border: 1px solid #ffcccc; }

        /* 選択肢 */
        .choice-btn { 
            display: block; width: 90%; margin: 10px auto; padding: 15px; 
            font-size: 1.5rem; font-weight: bold; border: 3px solid #ddd; border-radius: 15px; 
            background: white; cursor: pointer; transition: 0.2s;
        }
        .correct { background-color: #ff7675 !important; color: white; border-color: #d63031; }
        .wrong { background-color: #dfe6e9 !important; color: #b2bec3; border-color: #b2bec3; opacity: 0.6; }

        #next-btn { margin-top: 20px; padding: 15px 40px; font-size: 1.2rem; background: #ff5a5a; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px 0 #c0392b; color: white; }
        #cry-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; margin-bottom: 10px; font-size: 1rem; }
    </style>
</head>
<body>

<div id="game-container">
    <h2 id="status-text">この ポケモン だーれだ？</h2>
    <button id="cry-btn" style="display:none;">🔊 なきごえを きく</button>
    
    <div id="img-box">
        <div id="loading-msg">さがしています...</div>
        <img id="pokemon-img" class="silhouette" src="" style="display:none;">
    </div>

    <div id="info-display"></div>

    <div id="choices"></div>
    <button id="next-btn" onclick="initGame()">つぎの ポケモン！</button>
</div>

<script>
    let correctNameKatakana = "";
    let pokemonAudio = null;
    let pokemonDetails = "";

    const typeTranslations = {
        normal: "ノーマル", fire: "ほのお", water: "みず", grass: "くさ", electric: "でんき",
        ice: "こおり", fighting: "かくとう", poison: "どく", ground: "じめん", flying: "ひこう",
        psychic: "エスパー", bug: "むし", rock: "いわ", ghost: "ゴースト", dragon: "ドラゴン",
        steel: "はがね", fairy: "フェアリー", dark: "あく"
    };

    // 不正解のカタカナを作る関数
    function generateWrongName(name) {
        const katakana = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
        let arr = name.split('');
        if (arr.length === 0) return "？？？";

        let idx = Math.floor(Math.random() * arr.length);
        // 伸ばし棒や小さい文字は避けて変える（読みやすさのため）
        if (arr[idx] === "ー" || arr[idx] === "ッ" || arr[idx] === "ャ" || arr[idx] === "ュ" || arr[idx] === "ョ") {
             idx = 0; 
        }

        let newChar = katakana[Math.floor(Math.random() * katakana.length)];
        while(newChar === arr[idx]) newChar = katakana[Math.floor(Math.random() * katakana.length)];
        arr[idx] = newChar;
        return arr.join('');
    }

    async function initGame() {
        // UIリセット
        document.getElementById('loading-msg').style.display = "block";
        document.getElementById('pokemon-img').style.display = "none";
        document.getElementById('pokemon-img').className = "silhouette";
        document.getElementById('choices').innerHTML = "";
        document.getElementById('info-display').innerHTML = "";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('cry-btn').style.display = "none";
        document.getElementById('status-text').innerText = "この ポケモン だーれだ？";

        const id = Math.floor(Math.random() * 1025) + 1;

        try {
            const [pokeRes, speciesRes] = await Promise.all([
                fetch(`https://pokeapi.co/api/v2/pokemon/${id}/`),
                fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`)
            ]);
            if (!pokeRes.ok || !speciesRes.ok) throw new Error("取得失敗");

            const pokeData = await pokeRes.json();
            const speciesData = await speciesRes.json();

            // 名前取得（PokeAPIのja-Hrktはカタカナなのでそのまま使用）
            const nameEntry = speciesData.names.find(n => n.language.name === "ja-Hrkt") || speciesData.names.find(n => n.language.name === "ja");
            correctNameKatakana = nameEntry.name;

            // 分類とタイプ
            const genusEntry = speciesData.genera.find(g => g.language.name === "ja-Hrkt") || speciesData.genera.find(g => g.language.name === "ja");
            const genus = genusEntry ? genusEntry.genus : "";
            const types = pokeData.types.map(t => typeTranslations[t.type.name] || t.type.name).join("・");
            pokemonDetails = `ぶんるい：${genus}<br>タイプ：${types}`;

            // 画像と音
            document.getElementById('pokemon-img').src = pokeData.sprites.other['official-artwork'].front_default;
            document.getElementById('pokemon-img').style.display = "block";
            document.getElementById('loading-msg').style.display = "none";
            pokemonAudio = new Audio(pokeData.cries.latest);
            document.getElementById('cry-btn').style.display = "inline-block";
            document.getElementById('cry-btn').onclick = () => pokemonAudio.play();

            // 選択肢作成
            let choices = [correctNameKatakana, generateWrongName(correctNameKatakana), generateWrongName(correctNameKatakana)];
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "choice-btn";
                btn.innerText = name;
                btn.onclick = () => checkAnswer(btn, name);
                document.getElementById('choices').appendChild(btn);
            });

        } catch (e) {
            console.error("エラー、再試行します", e);
            initGame();
        }
    }

    function checkAnswer(btn, selectedName) {
        if (selectedName === correctNameKatakana) {
            btn.classList.add('correct');
            document.getElementById('pokemon-img').className = "reveal";
            document.getElementById('status-text').innerText = "せいかい！";
            
            document.getElementById('info-display').innerHTML = `
                <div class="pokemon-name-main">${correctNameKatakana}</div>
                <div class="pokemon-details">${pokemonDetails}</div>
            `;

            if (pokemonAudio) {
                pokemonAudio.play();
                pokemonAudio.onended = () => {
                    setTimeout(() => speakName(correctNameKatakana), 300);
                };
            } else {
                speakName(correctNameKatakana);
            }

            document.getElementById('next-btn').style.display = "inline-block";
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        } else {
            btn.classList.add('wrong');
            btn.disabled = true;
            document.getElementById('status-text').innerText = "ザンネン！ ちがうよ";
        }
    }

    function speakName(name) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(name);
            uttr.lang = 'ja-JP';
            uttr.rate = 0.8;
            uttr.pitch = 1.1;
            window.speechSynthesis.speak(uttr);
        }
    }

    initGame();
</script>

</body>
</html>
