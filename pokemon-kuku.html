<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポケモンでくく！</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #333;
  overflow-x: hidden;
}

.header {
  text-align: center;
  padding: 12px;
  color: white;
}
.header h1 {
  font-size: 26px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.score-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 4px 16px;
  color: white;
  font-size: 15px;
  font-weight: bold;
}

.main-card {
  background: white;
  border-radius: 20px;
  padding: 16px;
  margin: 6px 12px;
  width: calc(100% - 24px);
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

.pokemon-name {
  font-size: 22px;
  font-weight: bold;
  color: #e74c3c;
  margin-bottom: 2px;
}

.pokemon-feature {
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
}

.pokemon-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin-bottom: 8px;
  min-height: 96px;
}

.pokemon-grid img {
  width: 96px;
  height: 96px;
  image-rendering: pixelated;
}
.pokemon-grid img.pop {
  animation: popIn 0.3s ease-out;
}
@keyframes popIn {
  0% { transform: scale(0); }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.question-text {
  font-size: 18px;
  font-weight: bold;
  margin: 8px 0;
  color: #2c3e50;
  line-height: 1.4;
  white-space: pre-line;
}

.question-formula {
  font-size: 30px;
  font-weight: bold;
  color: #e74c3c;
  margin: 4px 0 8px;
}

/* 数字表示エリア */
.answer-display {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  min-height: 52px;
}
.answer-box {
  min-width: 90px;
  height: 48px;
  line-height: 48px;
  font-size: 30px;
  font-weight: bold;
  text-align: center;
  background: #f0f0f0;
  border: 3px solid #667eea;
  border-radius: 12px;
  color: #333;
  padding: 0 12px;
}

/* 数字パネル */
.numpad {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 10px;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
}
.num-btn {
  height: 52px;
  font-size: 24px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #f0f2f5;
  color: #333;
  transition: transform 0.08s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.num-btn:active { transform: scale(0.92); background: #dde0e5; }
.num-btn.del {
  background: #ffe0e0;
  color: #e74c3c;
  font-size: 18px;
}
.num-btn.ok {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 18px;
}
.num-btn:disabled {
  opacity: 0.4;
  transform: none;
}

.btn-next {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: white;
  display: none;
  margin: 0 auto;
  height: 48px;
  padding: 0 32px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
.btn-next:active { transform: scale(0.95); }

.result-msg {
  font-size: 22px;
  font-weight: bold;
  min-height: 32px;
  margin-top: 6px;
}
.result-msg.correct { color: #27ae60; }
.result-msg.wrong { color: #e74c3c; }

.btn-back {
  display: block;
  margin: 10px auto 0;
  padding: 8px 20px;
  font-size: 14px;
  color: #999;
  background: none;
  border: 1px solid #ccc;
  border-radius: 10px;
  cursor: pointer;
}

/* 段の選択画面 */
.mode-select {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin: 8px 16px;
  width: calc(100% - 32px);
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}
.mode-select h2 {
  font-size: 20px;
  margin-bottom: 16px;
  color: #2c3e50;
}

.dan-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.dan-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  background: #f8f9fa;
  border: 2px solid #ddd;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.dan-btn:active { transform: scale(0.95); }
.dan-btn.selected {
  border-color: #667eea;
  background: #eef0ff;
}
.dan-btn img {
  width: 56px;
  height: 56px;
  image-rendering: pixelated;
}
.dan-btn span {
  font-size: 13px;
  font-weight: bold;
  color: #555;
  margin-top: 2px;
}

.btn-start {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: white;
  width: 100%;
  padding: 14px;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
}
.btn-start:active { transform: scale(0.95); }

.btn-all {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  width: 100%;
  padding: 12px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  margin-bottom: 10px;
}

/* 結果画面 */
.result-screen {
  display: none;
  background: white;
  border-radius: 20px;
  padding: 24px;
  margin: 8px 16px;
  width: calc(100% - 32px);
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}
.result-screen h2 { font-size: 24px; margin-bottom: 16px; }
.result-stars { font-size: 40px; margin: 12px 0; }
.result-detail { font-size: 18px; margin: 8px 0; color: #555; }
.btn-retry {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  margin-top: 16px;
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
}

.hidden { display: none !important; }

/* イーブイ特別表示 */
.eevee-evos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 2px;
  margin-bottom: 4px;
}
.eevee-evos img {
  width: 40px;
  height: 40px;
  image-rendering: pixelated;
}
.eevee-label {
  font-size: 12px;
  color: #999;
  margin-bottom: 8px;
}
</style>
</head>
<body>

<div class="header">
  <h1>ポケモンでくく！</h1>
</div>

<div class="score-bar" id="scoreBar">
  <span>⭕ <span id="correctCount">0</span></span>
  <span>❌ <span id="wrongCount">0</span></span>
  <span>のこり <span id="remainCount">0</span>もん</span>
</div>

<!-- 段の選択 -->
<div class="mode-select" id="modeSelect">
  <h2>れんしゅうするだんをえらんでね！</h2>
  <div class="dan-grid" id="danGrid"></div>
  <button type="button" class="btn-all" id="btnAll">ぜんぶえらぶ</button>
  <button type="button" class="btn-start" id="btnStart">スタート！</button>
</div>

<!-- 問題画面 -->
<div class="main-card hidden" id="gameCard">
  <div class="pokemon-name" id="pokeName"></div>
  <div class="pokemon-feature" id="pokeFeature"></div>
  <div id="eeveeEvosArea"></div>
  <div class="pokemon-grid" id="pokeGrid"></div>
  <div class="question-text" id="questionText"></div>
  <div class="question-formula" id="questionFormula"></div>
  <div class="answer-display">
    <div class="answer-box" id="answerBox">&nbsp;</div>
  </div>
  <div class="numpad" id="numpad">
    <button type="button" class="num-btn" data-num="1">1</button>
    <button type="button" class="num-btn" data-num="2">2</button>
    <button type="button" class="num-btn" data-num="3">3</button>
    <button type="button" class="num-btn del" data-action="del">けす</button>
    <button type="button" class="num-btn" data-num="4">4</button>
    <button type="button" class="num-btn" data-num="5">5</button>
    <button type="button" class="num-btn" data-num="6">6</button>
    <button type="button" class="num-btn ok" data-action="ok">OK</button>
    <button type="button" class="num-btn" data-num="7">7</button>
    <button type="button" class="num-btn" data-num="8">8</button>
    <button type="button" class="num-btn" data-num="9">9</button>
    <button type="button" class="num-btn" data-num="0">0</button>
  </div>
  <button type="button" class="btn-next" id="nextBtn">つぎへ ▶</button>
  <button type="button" class="btn-back" id="btnBack">もどる</button>
  <div class="result-msg" id="resultMsg"></div>
</div>

<!-- 結果画面 -->
<div class="result-screen" id="resultScreen">
  <h2>けっか はっぴょう！</h2>
  <div class="result-stars" id="resultStars"></div>
  <div class="result-detail" id="resultDetail"></div>
  <div class="result-detail" id="resultAccuracy"></div>
  <button type="button" class="btn-retry" id="btnRetry">もういちど あそぶ</button>
</div>

<script>
const POKEMON_DATA = [
  { num: 1, name: 'ピカチュウ', feature: 'しっぽが1ぽん', unit: 'ぽん', partName: 'しっぽ', dexId: 25 },
  { num: 2, name: 'ドードー', feature: 'あたまが2つ', unit: 'こ', partName: 'あたま', dexId: 84 },
  { num: 3, name: 'ドードリオ', feature: 'あたまが3つ', unit: 'こ', partName: 'あたま', dexId: 85 },
  { num: 4, name: 'クレッフィ', feature: 'かぎが4つ', unit: 'つ', partName: 'かぎ', dexId: 707 },
  { num: 5, name: 'ヒトデマン', feature: 'さきっぽが5つ', unit: 'つ', partName: 'さきっぽ', dexId: 120 },
  { num: 6, name: 'ロコン', feature: 'しっぽが6ぽん', unit: 'ぽん', partName: 'しっぽ', dexId: 37 },
  { num: 7, name: 'ガメノデス', feature: '7たいがったい', unit: 'たい', partName: 'からだ', dexId: 689 },
  { num: 8, name: 'イーブイ', feature: 'しんかけいが8しゅるい', unit: 'しゅるい', partName: 'しんか', dexId: 133 },
  { num: 9, name: 'キュウコン', feature: 'しっぽが9ほん', unit: 'ほん', partName: 'しっぽ', dexId: 38 },
];

const EEVEE_EVOS = [
  { name: 'シャワーズ', dexId: 134 },
  { name: 'サンダース', dexId: 135 },
  { name: 'ブースター', dexId: 136 },
  { name: 'エーフィ', dexId: 196 },
  { name: 'ブラッキー', dexId: 197 },
  { name: 'リーフィア', dexId: 470 },
  { name: 'グレイシア', dexId: 471 },
  { name: 'ニンフィア', dexId: 700 },
];

function spriteUrl(dexId) {
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${dexId}.png`;
}

let selectedDans = new Set();
let questions = [];
let currentQ = 0;
let correctTotal = 0;
let wrongTotal = 0;
let currentInput = '';
let answered = false;

// === 音声読み上げ ===
function speak(text, rate) {
  speechSynthesis.cancel();
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = rate || 0.95;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

// ポケモンの鳴き声
function playCry(dexId) {
  const audio = new Audio(`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${dexId}.ogg`);
  audio.volume = 0.5;
  audio.play().catch(() => {});
}

// 九九の読み方テーブル
const KUKU_FIRST = {
  1: 'いん', 2: 'に', 3: 'さん', 4: 'し',
  5: 'ご', 6: 'ろく', 7: 'しち', 8: 'はち', 9: 'く'
};
const KUKU_SECOND = {
  1: 'いち', 2: 'に', 3: 'さん', 4: 'し',
  5: 'ご', 6: 'ろく', 7: 'しち', 8: 'は', 9: 'く'
};
// 答えの読み
function readNumber(n) {
  const special = {
    1:'いち',2:'に',3:'さん',4:'し',5:'ご',6:'ろく',7:'しち',8:'はち',9:'く',
    10:'じゅう',11:'じゅういち',12:'じゅうに',13:'じゅうさん',14:'じゅうし',
    15:'じゅうご',16:'じゅうろく',17:'じゅうしち',18:'じゅうはち',
    20:'にじゅう',21:'にじゅういち',24:'にじゅうし',27:'にじゅうしち',28:'にじゅうはち',
    30:'さんじゅう',32:'さんじゅうに',36:'さんじゅうろく',
    40:'しじゅう',42:'しじゅうに',45:'しじゅうご',48:'しじゅうはち',
    49:'しじゅうく',54:'ごじゅうし',56:'ごじゅうろく',63:'ろくじゅうさん',
    64:'ろくじゅうし',72:'しちじゅうに',81:'はちじゅういち'
  };
  if (special[n]) return special[n];
  const tens = Math.floor(n / 10);
  const ones = n % 10;
  const tensRead = {2:'にじゅう',3:'さんじゅう',4:'しじゅう',5:'ごじゅう',
    6:'ろくじゅう',7:'しちじゅう',8:'はちじゅう'}[tens] || '';
  const onesRead = {1:'いち',2:'に',3:'さん',4:'し',5:'ご',
    6:'ろく',7:'しち',8:'はち',9:'く'}[ones] || '';
  return tensRead + onesRead;
}

// 九九の「が」の有無（10未満の答えには「が」をつける）
function kukuReading(a, b) {
  const result = a * b;
  const first = KUKU_FIRST[a];
  const second = KUKU_SECOND[b];
  const ga = result <= 9 ? 'が' : '';
  const answer = readNumber(result);
  return `${first} ${second} ${ga} ${answer}`;
}

// 数字パネル入力
function numInput(n) {
  if (answered) return;
  if (currentInput.length >= 2) return; // 最大2桁（81まで）
  currentInput += String(n);
  document.getElementById('answerBox').textContent = currentInput;
}

function numDelete() {
  if (answered) return;
  currentInput = currentInput.slice(0, -1);
  document.getElementById('answerBox').innerHTML = currentInput || '&nbsp;';
}

function setNumpadEnabled(enabled) {
  document.querySelectorAll('.num-btn').forEach(btn => {
    btn.disabled = !enabled;
  });
}

// 段選択画面の初期化
function initDanSelect() {
  const grid = document.getElementById('danGrid');
  grid.innerHTML = '';
  POKEMON_DATA.forEach(p => {
    const btn = document.createElement('div');
    btn.className = 'dan-btn';
    btn.dataset.num = p.num;
    btn.innerHTML = `<img src="${spriteUrl(p.dexId)}" alt="${p.name}"><span>${p.num}のだん</span>`;
    btn.onclick = () => toggleDan(p.num, btn);
    grid.appendChild(btn);
  });
}

function toggleDan(num, btn) {
  if (selectedDans.has(num)) {
    selectedDans.delete(num);
    btn.classList.remove('selected');
  } else {
    selectedDans.add(num);
    btn.classList.add('selected');
  }
}

function selectAll() {
  const btns = document.querySelectorAll('.dan-btn');
  const allSelected = selectedDans.size === 9;
  btns.forEach(btn => {
    const num = parseInt(btn.dataset.num);
    if (allSelected) {
      selectedDans.delete(num);
      btn.classList.remove('selected');
    } else {
      selectedDans.add(num);
      btn.classList.add('selected');
    }
  });
}

function startGame() {
  if (selectedDans.size === 0) {
    alert('だんをえらんでね！');
    return;
  }
  questions = [];
  selectedDans.forEach(dan => {
    for (let i = 1; i <= 9; i++) {
      questions.push({ dan, multiplier: i });
    }
  });
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentQ = 0;
  correctTotal = 0;
  wrongTotal = 0;
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  document.getElementById('remainCount').textContent = questions.length;
  document.getElementById('modeSelect').classList.add('hidden');
  document.getElementById('gameCard').classList.remove('hidden');
  document.getElementById('resultScreen').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  const poke = POKEMON_DATA.find(p => p.num === q.dan);
  const count = q.multiplier;

  document.getElementById('pokeName').textContent = poke.name;
  document.getElementById('pokeFeature').textContent = `（1ぴきで ${poke.feature}）`;

  const grid = document.getElementById('pokeGrid');
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.src = spriteUrl(poke.dexId);
    img.alt = poke.name;
    img.classList.add('pop');
    img.style.animationDelay = `${i * 0.08}s`;
    grid.appendChild(img);
  }

  const eeveeArea = document.getElementById('eeveeEvosArea');
  if (poke.num === 8) {
    let html = '<div class="eevee-evos">';
    EEVEE_EVOS.forEach(e => {
      html += `<img src="${spriteUrl(e.dexId)}" alt="${e.name}" title="${e.name}">`;
    });
    html += '</div><div class="eevee-label">↑ 8しゅるいのしんかけい</div>';
    eeveeArea.innerHTML = html;
  } else {
    eeveeArea.innerHTML = '';
  }

  const questionText = document.getElementById('questionText');
  if (poke.num === 8) {
    questionText.textContent = `イーブイが ${count}ひき いたら\nしんかけいは ぜんぶで なんしゅるい？`;
  } else if (poke.num === 7) {
    questionText.textContent = `ガメノデスが ${count}ひき いたら\nからだは ぜんぶで なんたい？`;
  } else {
    questionText.textContent = `${poke.name}が ${count}ひき いたら\n${poke.partName}は ぜんぶで なん${poke.unit}？`;
  }

  document.getElementById('questionFormula').textContent = `${poke.num} × ${count} = ？`;

  // リセット
  currentInput = '';
  answered = false;
  document.getElementById('answerBox').innerHTML = '&nbsp;';
  setNumpadEnabled(true);
  document.getElementById('numpad').style.display = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('resultMsg').textContent = '';
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('remainCount').textContent = questions.length - currentQ;

  // 問題を読み上げ
  const speakText = document.getElementById('questionText').textContent;
  speak(speakText, 0.9);
}

function checkAnswer() {
  if (answered) return;
  const q = questions[currentQ];
  const poke = POKEMON_DATA.find(p => p.num === q.dan);
  const correct = poke.num * q.multiplier;
  const answer = parseInt(currentInput);
  const msg = document.getElementById('resultMsg');

  if (isNaN(answer) || currentInput === '') return;

  answered = true;
  setNumpadEnabled(false);
  document.getElementById('nextBtn').style.display = 'block';

  if (answer === correct) {
    msg.textContent = '🎉 せいかい！';
    msg.className = 'result-msg correct';
    correctTotal++;
    document.getElementById('correctCount').textContent = correctTotal;
  } else {
    msg.textContent = `😢 ざんねん… こたえは ${correct}`;
    msg.className = 'result-msg wrong';
    wrongTotal++;
    document.getElementById('wrongCount').textContent = wrongTotal;
  }

  document.getElementById('questionFormula').textContent = `${poke.num} × ${q.multiplier} = ${correct}`;

  // 九九を読み上げてから鳴き声
  const reading = kukuReading(poke.num, q.multiplier);
  speak(reading, 0.85).then(() => {
    playCry(poke.dexId);
  });
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('gameCard').classList.add('hidden');
  const screen = document.getElementById('resultScreen');
  screen.style.display = '';

  const total = questions.length;
  const pct = Math.round((correctTotal / total) * 100);
  let stars = '';
  if (pct === 100) stars = '⭐⭐⭐ かんぺき！';
  else if (pct >= 80) stars = '⭐⭐ すごい！';
  else if (pct >= 50) stars = '⭐ がんばった！';
  else stars = 'もっと れんしゅう しよう！';

  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultDetail').textContent = `${total}もんちゅう ${correctTotal}もん せいかい！`;
  document.getElementById('resultAccuracy').textContent = `せいかいりつ ${pct}%`;
}

function backToSelect() {
  speechSynthesis.cancel();
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('gameCard').classList.add('hidden');
  document.getElementById('modeSelect').classList.remove('hidden');
}

// タッチ対応イベントハンドラ
function safeClick(el, fn) {
  el.addEventListener('touchend', function(e) {
    e.preventDefault();
    e.stopPropagation();
    fn();
  }, { passive: false });
  el.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
  });
}
